<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>ScoreChat – Inbox</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;500;600&display=swap"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.5/socket.io.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0f2f5;--panel:#ffffff;--panel-header:#f0f2f5;--sidebar:#202c33;
  --sidebar-icon:#8696a0;--sidebar-icon-active:#ffffff;
  --primary:#00a884;--primary-dark:#008069;
  --text1:#111b21;--text2:#667781;--text3:#8696a0;
  --border:#e9edef;--hover:#f5f6f6;--active:#f0f2f5;
  --msg-out:#d9fdd3;--msg-in:#ffffff;
  --chat-bg:#efeae2;--chat-pattern:url('/assets/chat_bg.png');
  --tick-grey:#667781;--tick-blue:#53bdeb;
  --unread:#25d366;--pin:#8696a0;
  --input-bg:#ffffff;--dropdown:#ffffff;
  --ctx-shadow:0 2px 15px rgba(0,0,0,.15);
  --radius:7.5px;--font:'Segoe UI',system-ui,sans-serif;
}
body{font-family:var(--font);background:var(--bg);height:100vh;overflow:hidden;display:flex;align-items:center;justify-content:center}
#app{width:100%;height:100vh;display:flex;background:var(--bg)}

/* ── NAV ICONS ── */
#nav{width:72px;min-width:72px;background:var(--sidebar);display:flex;flex-direction:column;align-items:center;padding:10px 0;gap:4px;z-index:10}
.nav-icon{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--sidebar-icon);transition:color .15s,background .15s;position:relative}
.nav-icon:hover{color:var(--sidebar-icon-active)}
.nav-icon.active{color:var(--sidebar-icon-active)}
.nav-icon svg{width:24px;height:24px;fill:currentColor}
.nav-badge{position:absolute;top:4px;right:4px;background:var(--unread);color:#fff;font-size:11px;font-weight:600;border-radius:10px;padding:1px 5px;min-width:18px;text-align:center;line-height:16px}
#nav-bottom{margin-top:auto;display:flex;flex-direction:column;align-items:center;gap:4px}
.nav-avatar{width:40px;height:40px;border-radius:50%;object-fit:cover;cursor:pointer;border:2px solid transparent;transition:border-color .15s}
.nav-avatar:hover{border-color:var(--sidebar-icon)}

/* ── LEFT PANEL ── */
#left{width:400px;min-width:320px;max-width:420px;background:var(--panel);display:flex;flex-direction:column;border-right:1px solid var(--border)}

/* Header */
#left-header{background:var(--panel-header);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;height:60px;flex-shrink:0}
#left-header h2{font-size:20px;font-weight:600;color:var(--text1)}
.header-actions{display:flex;gap:4px}
.icon-btn{width:40px;height:40px;border-radius:50%;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text3);transition:background .15s}
.icon-btn:hover{background:var(--hover)}
.icon-btn svg{width:24px;height:24px}

/* Search */
#search-wrap{padding:8px 12px;background:var(--panel);flex-shrink:0}
#search-box{position:relative;display:flex;align-items:center}
#search-box input{width:100%;padding:9px 16px 9px 38px;background:#f0f2f5;border:none;border-radius:8px;font-size:15px;color:var(--text1);outline:none;font-family:var(--font)}
#search-box input::placeholder{color:var(--text3)}
#search-icon{position:absolute;left:10px;color:var(--text3);pointer-events:none}
#search-icon svg{width:18px;height:18px;fill:var(--text3)}
#search-back{display:none;position:absolute;left:8px;cursor:pointer;color:var(--primary)}
#search-back svg{width:20px;height:20px;fill:var(--primary)}

/* Filters */
#filters{padding:4px 12px 8px;display:flex;gap:6px;overflow-x:auto;flex-shrink:0;scrollbar-width:none}
#filters::-webkit-scrollbar{display:none}
.filter-chip{padding:5px 14px;border-radius:20px;border:none;background:#f0f2f5;color:var(--text2);font-size:14px;font-weight:500;cursor:pointer;white-space:nowrap;transition:background .15s,color .15s;font-family:var(--font)}
.filter-chip.active{background:#d9fdd3;color:var(--primary-dark)}
.filter-chip .unread-count{background:var(--unread);color:#fff;border-radius:10px;padding:0 5px;font-size:11px;margin-left:4px}

/* Archive row */
#archive-row{display:flex;align-items:center;gap:14px;padding:10px 18px;cursor:pointer;border-bottom:1px solid var(--border)}
#archive-row:hover{background:var(--hover)}
#archive-row svg{width:22px;height:22px;fill:var(--text3)}
#archive-row span{font-size:15px;color:var(--text1)}
#archive-count{margin-left:auto;background:var(--unread);color:#fff;font-size:12px;font-weight:600;border-radius:10px;padding:1px 6px;display:none}

/* Chat list */
#chat-list{flex:1;overflow-y:auto;overflow-x:hidden}
#chat-list::-webkit-scrollbar{width:5px}
#chat-list::-webkit-scrollbar-thumb{background:#ccc;border-radius:4px}

.chat-item{display:flex;align-items:center;gap:12px;padding:10px 16px;cursor:pointer;border-bottom:1px solid transparent;position:relative;transition:background .1s}
.chat-item:hover{background:var(--hover)}
.chat-item.active{background:var(--active)}
.chat-item .avatar{width:49px;height:49px;border-radius:50%;object-fit:cover;flex-shrink:0;background:#dfe5e7}
.chat-item .avatar-placeholder{width:49px;height:49px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:600;color:#fff}
.chat-item .info{flex:1;min-width:0}
.chat-item .row1{display:flex;align-items:center;justify-content:space-between;margin-bottom:3px}
.chat-item .name{font-size:16px;color:var(--text1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.chat-item .name.unread{font-weight:600}
.chat-item .time{font-size:12px;color:var(--text3);flex-shrink:0;margin-left:8px}
.chat-item .time.unread{color:var(--unread)}
.chat-item .row2{display:flex;align-items:center;justify-content:space-between}
.chat-item .preview{font-size:14px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;display:flex;align-items:center;gap:4px}
.chat-item .preview svg{width:15px;height:15px;flex-shrink:0;fill:var(--tick-grey)}
.chat-item .preview svg.blue{fill:var(--tick-blue)}
.chat-item .indicators{display:flex;align-items:center;gap:5px;flex-shrink:0;margin-left:6px}
.chat-item .badge{background:var(--unread);color:#fff;font-size:11px;font-weight:600;border-radius:10px;padding:1px 6px;min-width:20px;text-align:center}
.chat-item .muted-badge{background:#8696a0;color:#fff;font-size:11px;font-weight:600;border-radius:10px;padding:1px 6px;min-width:20px;text-align:center}
.chat-item .pin-icon svg{width:14px;height:14px;fill:var(--pin);transform:rotate(0deg)}
.hover-arrow{display:none;position:absolute;right:12px;top:50%;transform:translateY(-50%);width:28px;height:28px;align-items:center;justify-content:center;border-radius:50%}
.chat-item:hover .hover-arrow{display:flex}

/* ── RIGHT PANEL ── */
#right{flex:1;display:flex;flex-direction:column;background:var(--chat-bg);background-image:var(--chat-pattern);background-size:412px;position:relative;overflow:hidden}

/* Empty state */
#empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;color:var(--text3);background:var(--chat-bg);background-image:var(--chat-pattern);background-size:412px}
#empty-state img{width:300px;opacity:.5}
#empty-state h2{font-size:32px;font-weight:300;color:var(--text1)}
#empty-state p{font-size:14px;max-width:380px;text-align:center;line-height:1.5}

/* Chat area */
#chat-area{flex:1;display:none;flex-direction:column;overflow:hidden}

/* Chat header */
#chat-header{background:var(--panel-header);padding:0 16px;height:60px;display:flex;align-items:center;gap:12px;flex-shrink:0;border-bottom:1px solid var(--border)}
#chat-header .hdr-left{display:flex;align-items:center;gap:12px;flex:1;cursor:pointer;min-width:0}
.hdr-avatar{width:40px;height:40px;border-radius:50%;object-fit:cover;flex-shrink:0;background:#dfe5e7}
.hdr-avatar-placeholder{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:600;color:#fff;flex-shrink:0}
.hdr-info .hdr-name{font-size:16px;font-weight:600;color:var(--text1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hdr-info .hdr-status{font-size:13px;color:var(--text2)}
.hdr-actions{display:flex;align-items:center;gap:2px}

/* Messages area */
#messages-wrap{flex:1;overflow-y:auto;padding:20px 8%;display:flex;flex-direction:column;gap:2px;scroll-behavior:smooth}
#messages-wrap::-webkit-scrollbar{width:6px}
#messages-wrap::-webkit-scrollbar-thumb{background:#c1c7cd;border-radius:3px}

/* Date separator */
.date-sep{text-align:center;margin:12px 0}
.date-sep span{background:rgba(255,255,255,.9);color:var(--text2);font-size:12.5px;font-weight:500;padding:5px 12px;border-radius:8px;box-shadow:0 1px 1px rgba(0,0,0,.06)}

/* Message bubbles */
.msg-row{display:flex;flex-direction:column;margin-bottom:1px}
.msg-row.out{align-items:flex-end}
.msg-row.in{align-items:flex-start}
.msg-bubble{max-width:65%;position:relative;border-radius:var(--radius);box-shadow:0 1px 1px rgba(0,0,0,.1);padding:6px 7px 8px 9px}
.msg-row.out .msg-bubble{background:var(--msg-out);border-radius:var(--radius) var(--radius) 0 var(--radius)}
.msg-row.in .msg-bubble{background:var(--msg-in);border-radius:var(--radius) var(--radius) var(--radius) 0}
.msg-bubble.first-out{border-radius:var(--radius) var(--radius) 0 var(--radius)}
.msg-bubble.first-in{border-radius:var(--radius) var(--radius) var(--radius) 0}
.msg-text{font-size:14.5px;color:var(--text1);word-wrap:break-word;white-space:pre-wrap;line-height:1.45}
.msg-footer{display:flex;align-items:center;justify-content:flex-end;gap:4px;margin-top:2px}
.msg-time{font-size:11px;color:var(--text3);white-space:nowrap}
.ticks svg{width:16px;height:16px}
.ticks .grey{fill:var(--tick-grey)}
.ticks .blue{fill:var(--tick-blue)}

/* Group sender name */
.msg-sender-name{font-size:13px;font-weight:600;margin-bottom:2px}

/* Media messages */
.msg-media{border-radius:4px;overflow:hidden;margin-bottom:4px;cursor:pointer}
.msg-media img,.msg-media video{width:100%;max-width:330px;display:block;border-radius:4px}
.msg-caption{font-size:14px;color:var(--text1);margin-top:3px;word-wrap:break-word}

/* Audio */
.audio-player{display:flex;align-items:center;gap:8px;min-width:200px}
.audio-btn{width:38px;height:38px;border-radius:50%;background:var(--primary);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.audio-btn svg{width:18px;height:18px;fill:#fff}
.audio-waveform{flex:1;height:34px;display:flex;align-items:center;gap:1.5px;cursor:pointer}
.audio-bar{width:3px;background:#d1d7db;border-radius:2px;transition:background .1s}
.audio-bar.played{background:var(--primary)}
.audio-dur{font-size:12px;color:var(--text2);min-width:32px}
.audio-speed{font-size:12px;font-weight:600;color:var(--text2);cursor:pointer;padding:2px 4px;border-radius:4px}
.audio-speed:hover{background:#e9edef}

/* Doc */
.doc-card{display:flex;align-items:center;gap:10px;padding:6px 4px}
.doc-icon{width:38px;height:38px;border-radius:50%;background:#e3f7e8;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.doc-icon svg{width:22px;height:22px;fill:var(--primary)}
.doc-info{flex:1;min-width:0}
.doc-name{font-size:13.5px;color:var(--text1);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.doc-size{font-size:12px;color:var(--text2)}
.doc-dl{width:34px;height:34px;border-radius:50%;background:transparent;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text2)}
.doc-dl:hover{background:var(--hover)}
.doc-dl svg{width:20px;height:20px;fill:currentColor}

/* Location */
.loc-card{border-radius:4px;overflow:hidden;cursor:pointer}
.loc-card img{width:100%;max-width:280px;display:block}
.loc-label{font-size:13px;color:var(--text2);padding:4px 0}

/* Poll */
.poll-card{min-width:240px}
.poll-title{font-size:15px;font-weight:600;color:var(--text1);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.poll-title svg{width:20px;height:20px;fill:var(--text2)}
.poll-opt{padding:8px 10px;border-radius:6px;border:1.5px solid #e9edef;margin-bottom:6px;cursor:pointer;font-size:14px;color:var(--text1);transition:border-color .15s,background .15s;position:relative;overflow:hidden}
.poll-opt:hover{border-color:var(--primary);background:#f0fbf7}
.poll-opt.voted{border-color:var(--primary);background:#e7f7f3}
.poll-bar{position:absolute;left:0;top:0;height:100%;background:#d9fdd3;opacity:.6;pointer-events:none}
.poll-opt-text{position:relative;z-index:1}
.poll-votes-count{font-size:12px;color:var(--text2);position:relative;z-index:1}

/* Reaction */
.msg-reactions{display:flex;gap:3px;margin-top:2px}
.reaction-pill{background:var(--msg-in);border-radius:12px;padding:2px 6px;font-size:13px;box-shadow:0 1px 2px rgba(0,0,0,.12);cursor:pointer}

/* Quoted */
.quoted-msg{border-left:4px solid var(--primary);background:rgba(0,0,0,.04);border-radius:4px;padding:6px 8px;margin-bottom:4px;cursor:pointer}
.quoted-msg .q-name{font-size:13px;font-weight:600;color:var(--primary)}
.quoted-msg .q-text{font-size:13px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* Input bar */
#input-bar{background:var(--panel-header);padding:8px 16px;display:flex;align-items:flex-end;gap:8px;flex-shrink:0;border-top:1px solid var(--border)}
#input-actions-left{display:flex;align-items:center;gap:2px}
#input-wrap{flex:1;background:var(--input-bg);border-radius:10px;display:flex;align-items:flex-end;padding:6px 12px;min-height:42px;max-height:120px;border:none}
#input-field{flex:1;border:none;outline:none;font-size:15px;font-family:var(--font);color:var(--text1);resize:none;max-height:100px;overflow-y:auto;background:transparent;line-height:1.4}
#input-field::placeholder{color:var(--text3)}
#send-btn{width:42px;height:42px;border-radius:50%;background:var(--primary);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s}
#send-btn:hover{background:var(--primary-dark)}
#send-btn svg{width:22px;height:22px;fill:#fff}
#mic-btn{width:42px;height:42px;border-radius:50%;background:var(--primary);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s}
#mic-btn:hover{background:var(--primary-dark)}
#mic-btn svg{width:22px;height:22px;fill:#fff}
#mic-btn.recording{background:#f44336;animation:pulse .8s infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}

/* Recording bar */
#recording-bar{display:none;flex:1;align-items:center;gap:12px;padding:0 8px}
#rec-time{font-size:15px;color:#f44336;font-weight:500;min-width:50px}
#rec-cancel{font-size:14px;color:var(--text2);cursor:pointer;padding:4px 8px;border-radius:4px}
#rec-cancel:hover{background:var(--hover)}
#rec-waveform{flex:1;height:30px;display:flex;align-items:center;gap:2px}
.rec-bar{width:3px;background:#f44336;border-radius:2px;animation:recAnim .4s ease-in-out infinite alternate}
@keyframes recAnim{from{height:4px}to{height:22px}}

/* Attach menu */
#attach-menu{position:absolute;bottom:70px;left:80px;background:var(--dropdown);border-radius:16px;box-shadow:var(--ctx-shadow);padding:12px 4px;display:none;flex-direction:column;gap:4px;z-index:100;min-width:180px}
#attach-menu.open{display:flex}
.attach-item{display:flex;align-items:center;gap:12px;padding:10px 16px;cursor:pointer;border-radius:8px;font-size:15px;color:var(--text1);transition:background .1s}
.attach-item:hover{background:var(--hover)}
.attach-item .att-icon{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.attach-item .att-icon svg{width:22px;height:22px;fill:#fff}

/* Context menu */
#ctx-menu{position:fixed;background:var(--dropdown);border-radius:8px;box-shadow:var(--ctx-shadow);padding:6px 0;display:none;z-index:1000;min-width:200px}
#ctx-menu.open{display:block}
.ctx-item{padding:10px 20px;font-size:14.5px;color:var(--text1);cursor:pointer;white-space:nowrap}
.ctx-item:hover{background:var(--hover)}
.ctx-item.danger{color:#f44336}
.ctx-sep{height:1px;background:var(--border);margin:4px 0}

/* Emoji picker */
#emoji-picker{position:absolute;bottom:70px;left:80px;background:var(--dropdown);border-radius:16px;box-shadow:var(--ctx-shadow);width:340px;height:380px;display:none;flex-direction:column;z-index:100;overflow:hidden}
#emoji-picker.open{display:flex}
#emoji-search{padding:10px 12px;border-bottom:1px solid var(--border)}
#emoji-search input{width:100%;padding:7px 12px;border-radius:8px;border:none;background:var(--hover);font-size:14px;outline:none;font-family:var(--font)}
#emoji-grid{flex:1;overflow-y:auto;padding:8px;display:flex;flex-wrap:wrap;gap:2px;align-content:flex-start}
.emoji-btn{width:38px;height:38px;display:flex;align-items:center;justify-content:center;font-size:22px;cursor:pointer;border-radius:6px;border:none;background:transparent}
.emoji-btn:hover{background:var(--hover)}

/* Poll modal */
#poll-modal{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:2000;display:none;align-items:center;justify-content:center}
#poll-modal.open{display:flex}
.modal-box{background:#fff;border-radius:16px;width:460px;max-height:85vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,.2)}
.modal-header{padding:18px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-header h3{font-size:18px;font-weight:600;color:var(--text1)}
.modal-body{padding:20px;flex:1;overflow-y:auto}
.modal-footer{padding:12px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px}
.btn-secondary{padding:9px 20px;border-radius:8px;border:none;background:var(--hover);color:var(--text1);font-size:15px;cursor:pointer;font-family:var(--font)}
.btn-primary{padding:9px 20px;border-radius:8px;border:none;background:var(--primary);color:#fff;font-size:15px;cursor:pointer;font-family:var(--font);font-weight:500}
.form-label{font-size:13px;color:var(--text2);margin-bottom:4px}
.form-input{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:14.5px;font-family:var(--font);outline:none;color:var(--text1)}
.form-input:focus{border-color:var(--primary)}
.poll-opt-input-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.poll-opt-input-row input{flex:1;padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;font-family:var(--font);outline:none;color:var(--text1)}
.poll-opt-input-row input:focus{border-color:var(--primary)}
.rm-opt-btn{width:28px;height:28px;border-radius:50%;border:none;background:var(--hover);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text2);flex-shrink:0}
.add-opt-btn{color:var(--primary);font-size:14px;font-weight:500;cursor:pointer;padding:6px 0;border:none;background:transparent;font-family:var(--font)}

/* Instance selector */
#instance-bar{background:#f0f2f5;padding:6px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-shrink:0}
#instance-bar label{font-size:13px;color:var(--text2);flex-shrink:0}
#instance-select{flex:1;padding:5px 10px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:var(--font);outline:none;background:#fff;color:var(--text1);cursor:pointer}
#instance-select:focus{border-color:var(--primary)}
.inst-status{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.inst-status.connected{background:#25d366}
.inst-status.disconnected{background:#f44336}

/* Typing indicator */
.typing-dots{display:flex;gap:3px;align-items:center;padding:6px 10px}
.typing-dots span{width:7px;height:7px;background:#90a4ae;border-radius:50%;animation:typing .9s infinite}
.typing-dots span:nth-child(2){animation-delay:.15s}
.typing-dots span:nth-child(3){animation-delay:.3s}
@keyframes typing{0%,80%,100%{transform:scale(.7);opacity:.5}40%{transform:scale(1);opacity:1}}

/* Loading */
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite;margin:auto}
@keyframes spin{to{transform:rotate(360deg)}}
#loading-overlay{position:fixed;inset:0;background:rgba(255,255,255,.8);display:flex;align-items:center;justify-content:center;z-index:9999}
#loading-overlay.hidden{display:none}

/* Toast */
#toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#202c33;color:#fff;padding:10px 20px;border-radius:8px;font-size:14px;z-index:9999;display:none;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* Color classes for avatars */
.av-green{background:#00a884}.av-blue{background:#039be5}.av-purple{background:#7c3aed}
.av-orange{background:#f97316}.av-pink{background:#ec4899}.av-teal{background:#0891b2}
.av-indigo{background:#4f46e5}.av-red{background:#dc2626}

/* Right: contact info panel */
#contact-panel{width:360px;background:#fff;border-left:1px solid var(--border);display:none;flex-direction:column;overflow-y:auto;flex-shrink:0}
#contact-panel.open{display:flex}
.cp-header{background:var(--panel-header);padding:0 16px;height:60px;display:flex;align-items:center;gap:16px;border-bottom:1px solid var(--border);flex-shrink:0}
.cp-body{padding:20px;display:flex;flex-direction:column;gap:16px}
.cp-avatar-big{width:200px;height:200px;border-radius:50%;margin:0 auto;object-fit:cover;display:block}
.cp-name{text-align:center;font-size:22px;font-weight:600;color:var(--text1)}
.cp-status{text-align:center;font-size:14px;color:var(--text2)}
.cp-section{background:var(--hover);border-radius:8px;padding:12px 16px}
.cp-section-title{font-size:13px;color:var(--primary);font-weight:500;margin-bottom:8px}
.cp-field{font-size:14.5px;color:var(--text1)}
.cp-note-area{width:100%;padding:10px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;font-family:var(--font);resize:vertical;min-height:80px;outline:none;color:var(--text1)}
.cp-note-area:focus{border-color:var(--primary)}
.cp-save-btn{padding:8px 18px;border-radius:8px;border:none;background:var(--primary);color:#fff;font-size:14px;cursor:pointer;font-family:var(--font)}

/* Hidden file inputs */
.hidden-input{display:none}

/* Scrollbar for message area */
.msg-load-more{text-align:center;padding:10px;font-size:13px;color:var(--primary);cursor:pointer}
.msg-load-more:hover{text-decoration:underline}

/* Unread divider */
.unread-divider{text-align:center;margin:12px 0}
.unread-divider span{background:#c8e6c9;color:#2e7d32;font-size:12.5px;font-weight:500;padding:5px 14px;border-radius:8px}

/* Mobile tweaks */
@media(max-width:768px){
  #nav{width:52px;min-width:52px}
  #left{width:100%;max-width:100%}
  #right{display:none}
  #right.mobile-open{display:flex}
}
</style>

<script>
// ─────────────────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────────────────
const API = '';
let token = localStorage.getItem('token') || '';
let selectedChat = null;
let selectedInstance = null;
let allChats = [];
let currentFilter = 'all';
let searchQuery = '';
let socket = null;
let mediaRecorder = null;
let recordingChunks = [];
let recordingTimer = null;
let recordingSeconds = 0;
let isRecording = false;
let emojiLoaded = false;
let chatMessages = {};
let pinnedChats = [];
let currentUserId = '';
let audioElements = {};

// ─────────────────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────────────────
async function init() {
  if (!token) { window.location.href = '/user?page=login'; return; }
  try {
    await loadInstances();
    initSocket();
    setupEventListeners();
    await loadChats();
    hideLoading();
  } catch(e) {
    console.error(e);
    hideLoading();
    toast('Erro ao carregar. Verifique o login.');
  }
}

function hideLoading() { document.getElementById('loading-overlay').classList.add('hidden'); }

// ─────────────────────────────────────────────────────────
// AUTH HEADERS
// ─────────────────────────────────────────────────────────
function headers() {
  return { 'Content-Type':'application/json', 'Authorization':`Bearer ${token}` };
}

async function api(method, path, body) {
  const opts = { method, headers: headers() };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(API + path, opts);
  return r.json();
}

// ─────────────────────────────────────────────────────────
// INSTANCES
// ─────────────────────────────────────────────────────────
async function loadInstances() {
  const data = await api('GET', '/api/user/get_instance');
  const sel = document.getElementById('instance-select');
  sel.innerHTML = '';
  if (!data.data || data.data.length === 0) {
    sel.innerHTML = '<option value="">Nenhuma instância</option>';
    return;
  }
  data.data.forEach(inst => {
    const opt = document.createElement('option');
    opt.value = inst.instance_id;
    opt.textContent = inst.title || inst.name || inst.jid || inst.instance_id;
    sel.appendChild(opt);
  });
  selectedInstance = sel.value;
  updateInstDot(data.data[0]?.status);

  sel.addEventListener('change', async () => {
    selectedInstance = sel.value;
    selectedChat = null;
    showEmpty();
    await loadChats();
  });
}

function updateInstDot(status) {
  const dot = document.getElementById('inst-dot');
  dot.className = 'inst-status ' + (status === 'open' || status === 'connected' ? 'connected' : 'disconnected');
}

// ─────────────────────────────────────────────────────────
// SOCKET.IO
// ─────────────────────────────────────────────────────────
function initSocket() {
  socket = io(window.location.origin, { transports: ['websocket','polling'] });

  socket.on('connect', () => {
    console.log('Socket connected:', socket.id);
    try {
      const decoded = JSON.parse(atob(token.split('.')[1]));
      currentUserId = decoded.uid || decoded.id || '';
      socket.emit('user_connected', { userId: currentUserId });
    } catch(e) {}
  });

  socket.on('new_message', async (data) => {
    if (!data || !data.chatId) return;
    const chatId = data.chatId;
    // Update chat preview
    const chatIdx = allChats.findIndex(c => c.chat_id === chatId);
    if (chatIdx !== -1) {
      allChats[chatIdx].last_msg = data.message;
      allChats[chatIdx].updatedAt = Date.now();
      if (!allChats[chatIdx].is_opened || selectedChat?.chat_id !== chatId) {
        allChats[chatIdx].unread_count = (allChats[chatIdx].unread_count || 0) + 1;
      }
    }
    renderChatList();
    // If this chat is open, add message
    if (selectedChat && selectedChat.chat_id === chatId) {
      if (!chatMessages[chatId]) chatMessages[chatId] = [];
      chatMessages[chatId].push(data.message);
      renderMessages(chatMessages[chatId]);
      scrollToBottom();
    }
  });

  socket.on('msg_ack', (data) => {
    if (!data) return;
    updateMessageStatus(data.msgId, data.status);
  });
}

// ─────────────────────────────────────────────────────────
// LOAD CHATS
// ─────────────────────────────────────────────────────────
async function loadChats() {
  if (!selectedInstance) return;
  document.getElementById('chat-list').innerHTML = '<div class="spinner" style="margin-top:40px"></div>';
  try {
    const data = await api('GET', `/api/inbox/get_my_chats?instance=${selectedInstance}`);
    allChats = Array.isArray(data.data) ? data.data : [];
    // Load pinned
    try {
      const pinData = await api('POST', '/api/inbox/get_pinned', { instance: selectedInstance });
      pinnedChats = pinData.data || [];
    } catch(e) { pinnedChats = []; }
    renderChatList();
    updateUnreadBadge();
  } catch(e) {
    console.error(e);
    document.getElementById('chat-list').innerHTML = '<div style="text-align:center;padding:20px;color:#667781;font-size:14px">Erro ao carregar conversas</div>';
  }
}

// ─────────────────────────────────────────────────────────
// RENDER CHAT LIST
// ─────────────────────────────────────────────────────────
function renderChatList() {
  const list = document.getElementById('chat-list');
  let chats = [...allChats];

  // Apply search
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    chats = chats.filter(c =>
      (c.sender_name || c.chat_name || '').toLowerCase().includes(q) ||
      (c.last_msg || '').toLowerCase().includes(q)
    );
  }

  // Apply filter
  if (currentFilter === 'unread') chats = chats.filter(c => (c.unread_count || 0) > 0 || !c.is_opened);
  if (currentFilter === 'groups') chats = chats.filter(c => c.chat_id?.includes('@g.us'));
  if (currentFilter === 'favorites') chats = chats.filter(c => c.is_favorite);

  // Sort: pinned first, then by updated
  const isPinned = (c) => pinnedChats.some(p => p.id === c.chat_id || p.jid === c.chat_id);
  chats.sort((a, b) => {
    const ap = isPinned(a) ? 0 : 1, bp = isPinned(b) ? 0 : 1;
    if (ap !== bp) return ap - bp;
    return (b.updatedAt || 0) - (a.updatedAt || 0);
  });

  // Unread count for filter chip
  const unreadTotal = allChats.filter(c => (c.unread_count || 0) > 0).length;
  const uc = document.getElementById('filter-unread-count');
  uc.textContent = unreadTotal;
  uc.style.display = unreadTotal > 0 ? 'inline' : 'none';

  if (chats.length === 0) {
    list.innerHTML = '<div style="text-align:center;padding:40px 20px;color:#667781;font-size:14px">'+(searchQuery?'Nenhuma conversa encontrada':'Nenhuma conversa')+'</div>';
    return;
  }

  list.innerHTML = chats.map(c => chatItemHTML(c)).join('');

  // Attach click handlers
  list.querySelectorAll('.chat-item').forEach(el => {
    el.addEventListener('click', () => openChat(el.dataset.chatId));
    el.addEventListener('contextmenu', (e) => { e.preventDefault(); showChatContextMenu(e, el.dataset.chatId); });
  });
}

function chatItemHTML(c) {
  const id = c.chat_id;
  const name = c.sender_name || c.chat_name || formatJid(id);
  const isGroup = id?.includes('@g.us');
  const unread = c.unread_count || 0;
  const isUnread = unread > 0 || !c.is_opened;
  const pinned = pinnedChats.some(p => p.id === id || p.jid === id);
  const muted = c.is_muted;
  const isActive = selectedChat?.chat_id === id;

  const avatarColor = getAvatarColor(name);
  const initials = getInitials(name);
  const timeStr = formatTime(c.updatedAt || c.timestamp);
  const preview = getPreviewText(c);

  const tickSVG = c.last_route === 'outgoing' ? tickIcon(c.status || 'sent') : '';

  return `<div class="chat-item${isActive?' active':''}" data-chat-id="${id}">
    <div class="avatar-placeholder ${avatarColor}">${initials}</div>
    <div class="info">
      <div class="row1">
        <span class="name${isUnread?' unread':''}">${escHtml(name)}</span>
        <span class="time${isUnread?' unread':''}">${timeStr}</span>
      </div>
      <div class="row2">
        <span class="preview">
          ${tickSVG}
          ${escHtml(preview)}
        </span>
        <div class="indicators">
          ${pinned?`<span class="pin-icon"><svg viewBox="0 0 24 24" style="width:14px;height:14px;fill:#8696a0"><path d="M16 12V4h1V2H7v2h1v8l-2 2v2h5.2v6h1.6v-6H18v-2l-2-2z"/></svg></span>`:''}
          ${muted?`<svg viewBox="0 0 24 24" style="width:16px;height:16px;fill:#8696a0"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>`:''}
          ${isUnread&&!muted?`<span class="badge">${unread>99?'99+':unread||''}</span>`:''}
          ${isUnread&&muted?`<span class="muted-badge">${unread>99?'99+':unread||''}</span>`:''}
        </div>
      </div>
    </div>
  </div>`;
}

// ─────────────────────────────────────────────────────────
// OPEN CHAT
// ─────────────────────────────────────────────────────────
async function openChat(chatId) {
  const chat = allChats.find(c => c.chat_id === chatId);
  if (!chat) return;

  selectedChat = chat;
  // Mark active
  document.querySelectorAll('.chat-item').forEach(el => el.classList.toggle('active', el.dataset.chatId === chatId));
  // Show chat area
  showChatArea();
  // Set header
  updateChatHeader(chat);
  // Load messages
  document.getElementById('messages-wrap').innerHTML = '<div class="spinner" style="margin:auto;margin-top:40px"></div>';
  try {
    const data = await api('POST', '/api/user/get_convo', { chatId });
    chatMessages[chatId] = Array.isArray(data.data) ? data.data : [];
    renderMessages(chatMessages[chatId]);
    scrollToBottom();
    // Mark as read
    const idx = allChats.findIndex(c => c.chat_id === chatId);
    if (idx !== -1) { allChats[idx].unread_count = 0; allChats[idx].is_opened = 1; }
    renderChatList();
    updateUnreadBadge();
  } catch(e) {
    console.error(e);
    document.getElementById('messages-wrap').innerHTML = '<div style="text-align:center;padding:20px;color:#667781">Erro ao carregar mensagens</div>';
  }

  // Fetch contact details
  fetchContactDetails(chat);
}

async function fetchContactDetails(chat) {
  if (!selectedInstance) return;
  const jid = chat.chat_id;
  try {
    if (jid.includes('@g.us')) {
      const data = await api('POST', '/api/inbox/get_group_meta', { sessionId: selectedInstance, jid });
      if (data.profilePhoto) setHdrAvatar(data.profilePhoto);
      if (data.groupData?.subject) document.getElementById('hdr-name').textContent = data.groupData.subject;
      document.getElementById('hdr-status').textContent = `${data.groupData?.participants?.length || 0} participantes`;
    } else {
      const data = await api('POST', '/api/inbox/get_sender_details', { sessionId: selectedInstance, jid });
      if (data.profilePhoto) setHdrAvatar(data.profilePhoto);
      if (data.status) document.getElementById('hdr-status').textContent = data.status;
    }
  } catch(e) {}
}

function setHdrAvatar(url) {
  const img = document.getElementById('hdr-avatar');
  const ph = document.getElementById('hdr-avatar-placeholder');
  img.src = url;
  img.style.display = 'block';
  ph.style.display = 'none';
  img.onerror = () => { img.style.display='none'; ph.style.display='flex'; };
}

function updateChatHeader(chat) {
  const name = chat.sender_name || chat.chat_name || formatJid(chat.chat_id);
  document.getElementById('hdr-name').textContent = name;
  document.getElementById('hdr-status').textContent = '';
  const ph = document.getElementById('hdr-avatar-placeholder');
  ph.className = `hdr-avatar-placeholder ${getAvatarColor(name)}`;
  ph.textContent = getInitials(name);
  document.getElementById('hdr-avatar').style.display = 'none';
  ph.style.display = 'flex';
}

// ─────────────────────────────────────────────────────────
// RENDER MESSAGES
// ─────────────────────────────────────────────────────────
function renderMessages(msgs) {
  const wrap = document.getElementById('messages-wrap');
  if (!msgs || msgs.length === 0) {
    wrap.innerHTML = '<div style="text-align:center;padding:40px;color:#667781;font-size:14px">Nenhuma mensagem ainda</div>';
    return;
  }

  let html = '';
  let lastDate = '';
  let lastRoute = '';

  msgs.forEach((msg, idx) => {
    const ts = (msg.timestamp || 0) * 1000;
    const dateStr = formatDateSep(ts);
    if (dateStr !== lastDate) {
      html += `<div class="date-sep"><span>${dateStr}</span></div>`;
      lastDate = dateStr;
      lastRoute = '';
    }

    const isOut = msg.route === 'outgoing';
    const rowCls = isOut ? 'out' : 'in';
    const isFirst = msg.route !== lastRoute;
    lastRoute = msg.route;

    html += `<div class="msg-row ${rowCls}" data-msg-id="${msg.msgId}">`;

    // Quoted/reply
    if (msg.context && msg.context.id) {
      html += renderQuoted(msg.context, msgs);
    }

    // Bubble
    html += `<div class="msg-bubble${isFirst?(isOut?' first-out':' first-in'):''}">`;

    // Sender name in groups
    if (msg.group && !isOut && msg.senderName) {
      const c = getAvatarColor(msg.senderName);
      const colors = {'av-green':'#00a884','av-blue':'#039be5','av-purple':'#7c3aed','av-orange':'#f97316','av-pink':'#ec4899','av-teal':'#0891b2','av-indigo':'#4f46e5','av-red':'#dc2626'};
      html += `<div class="msg-sender-name" style="color:${colors[c]||'#00a884'}">${escHtml(msg.senderName)}</div>`;
    }

    // Content
    html += renderMsgContent(msg);

    // Footer (time + ticks)
    html += `<div class="msg-footer">
      <span class="msg-time">${formatMsgTime(ts)}</span>
      ${isOut ? `<span class="ticks">${tickIcon(msg.status||'sent')}</span>` : ''}
    </div>`;
    html += '</div>'; // bubble

    // Reactions
    if (msg.reaction) {
      html += `<div class="msg-reactions"><span class="reaction-pill">${msg.reaction}</span></div>`;
    }

    html += '</div>'; // row
  });

  wrap.innerHTML = html;

  // Attach audio players
  wrap.querySelectorAll('.audio-waveform').forEach(el => initWaveformClick(el));
  wrap.querySelectorAll('.audio-play-btn').forEach(btn => {
    btn.addEventListener('click', () => toggleAudio(btn.dataset.src, btn));
  });
}

function renderMsgContent(msg) {
  const type = msg.type || 'text';
  const ctx = msg.msgContext || {};

  switch(type) {
    case 'text': return `<div class="msg-text">${formatText(ctx.text || msg.content || '')}</div>`;
    case 'image': {
      const src = ctx.fileName ? `/media/${ctx.fileName}` : '';
      return `<div class="msg-media" onclick="openMedia('${src}','image')">
        ${src?`<img src="${src}" alt="Imagem" loading="lazy"/>`:'<div style="background:#dfe5e7;width:200px;height:150px;border-radius:4px;display:flex;align-items:center;justify-content:center;color:#667781">📷 Imagem</div>'}
        </div>${ctx.caption?`<div class="msg-caption">${escHtml(ctx.caption)}</div>`:''}`;
    }
    case 'video': {
      const src = ctx.fileName ? `/media/${ctx.fileName}` : '';
      return `<div class="msg-media">
        ${src?`<video src="${src}" controls style="max-width:300px;border-radius:4px"></video>`:'<div style="background:#dfe5e7;width:200px;height:150px;border-radius:4px;display:flex;align-items:center;justify-content:center">🎥 Vídeo</div>'}
        </div>${ctx.caption?`<div class="msg-caption">${escHtml(ctx.caption)}</div>`:''}`;
    }
    case 'aud': {
      const src = ctx.fileName ? `/media/${ctx.fileName}` : '';
      const bars = Array.from({length:30},(_,i)=>`<div class="audio-bar" style="height:${8+Math.random()*18}px"></div>`).join('');
      return `<div class="audio-player">
        <button class="audio-btn audio-play-btn" data-src="${src}" data-playing="false">
          <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        </button>
        <div class="audio-waveform" data-src="${src}">${bars}</div>
        <span class="audio-dur">0:00</span>
        <span class="audio-speed">1×</span>
      </div>`;
    }
    case 'doc': {
      const name = ctx.fileName || ctx.originalFile || 'Documento';
      const url = ctx.fileName ? `/media/${ctx.fileName}` : '#';
      return `<div class="doc-card">
        <div class="doc-icon"><svg viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg></div>
        <div class="doc-info"><div class="doc-name">${escHtml(name)}</div><div class="doc-size">Documento</div></div>
        <a href="${url}" download class="doc-dl"><svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg></a>
      </div>`;
    }
    case 'loc': {
      const lat = ctx.lat, lng = ctx.long;
      const mapUrl = `https://maps.googleapis.com/maps/api/staticmap?center=${lat},${lng}&zoom=15&size=280x140&markers=${lat},${lng}`;
      const gmUrl = `https://www.google.com/maps?q=${lat},${lng}`;
      return `<div class="loc-card" onclick="window.open('${gmUrl}','_blank')">
        <div style="background:#dfe5e7;width:280px;height:140px;border-radius:4px;display:flex;align-items:center;justify-content:center;color:#667781;font-size:14px">📍 Localização<br/>${lat}, ${lng}</div>
        <div class="loc-label">Toque para abrir no mapa</div>
      </div>`;
    }
    case 'poll': {
      const poll = ctx.poll || ctx;
      const name = poll.name || 'Enquete';
      const values = poll.values || [];
      const opts = values.map((v,i)=>`<div class="poll-opt"><div class="poll-opt-text">${escHtml(v)}</div></div>`).join('');
      return `<div class="poll-card">
        <div class="poll-title"><svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>${escHtml(name)}</div>
        ${opts}
        <div style="font-size:12px;color:#667781;margin-top:6px">Clique para votar</div>
      </div>`;
    }
    default: return `<div class="msg-text">${escHtml(JSON.stringify(ctx))}</div>`;
  }
}

function renderQuoted(ctx, msgs) {
  const orig = msgs.find(m => m.msgId === ctx.id);
  const text = orig ? (orig.msgContext?.text || getPreviewText(orig)) : 'Mensagem';
  const name = orig ? (orig.route === 'outgoing' ? 'Você' : orig.senderName) : '';
  return `<div class="quoted-msg">
    ${name?`<div class="q-name">${escHtml(name)}</div>`:''}
    <div class="q-text">${escHtml(text)}</div>
  </div>`;
}

// ─────────────────────────────────────────────────────────
// SEND MESSAGE
// ─────────────────────────────────────────────────────────
async function sendText() {
  if (!selectedChat || !selectedInstance) return;
  const field = document.getElementById('input-field');
  const text = field.innerText.trim();
  if (!text) return;
  field.innerText = '';
  updateSendBtn();

  const chatId = selectedChat.chat_id;
  const toJid = selectedChat.chat_id;
  const toName = selectedChat.sender_name || selectedChat.chat_name || '';

  // Optimistic update
  const tempMsg = {
    msgId: 'temp_'+Date.now(), type:'text', route:'outgoing', status:'pending',
    timestamp: Math.floor(Date.now()/1000),
    msgContext: { text }
  };
  if (!chatMessages[chatId]) chatMessages[chatId] = [];
  chatMessages[chatId].push(tempMsg);
  renderMessages(chatMessages[chatId]);
  scrollToBottom();

  try {
    const r = await api('POST', '/api/inbox/send_text', { text, toJid, toName, chatId, instance: selectedInstance });
    if (r.success) {
      const idx = chatMessages[chatId].findIndex(m => m.msgId === tempMsg.msgId);
      if (idx !== -1) chatMessages[chatId][idx].status = 'sent';
      renderMessages(chatMessages[chatId]);
      scrollToBottom();
    } else { toast(r.msg || 'Erro ao enviar'); }
  } catch(e) { toast('Erro ao enviar mensagem'); }
}

async function sendFile(type, file) {
  if (!selectedChat || !selectedInstance || !file) return;
  toast('Enviando arquivo...');
  const formData = new FormData();
  formData.append('file', file);

  try {
    const r = await fetch('/api/user/return_url', {
      method: 'POST',
      headers: { Authorization: `Bearer ${token}` },
      body: formData
    });
    const data = await r.json();
    if (!data.success) { toast(data.msg || 'Erro ao fazer upload'); return; }

    const fileName = data.fileName;
    const toJid = selectedChat.chat_id;
    const toName = selectedChat.sender_name || selectedChat.chat_name || '';
    const chatId = selectedChat.chat_id;

    let endpoint, body;
    if (type === 'image' || type === 'video') {
      endpoint = type === 'image' ? '/api/inbox/send_image' : '/api/inbox/send_video';
      body = { toJid, toName, chatId, instance: selectedInstance, fileName, [type==='image'?'image':'fileName']: fileName, originalFile: file.name };
    } else if (type === 'doc') {
      endpoint = '/api/inbox/send_doc';
      body = { toJid, toName, chatId, instance: selectedInstance, fileName, originalFile: file.name };
    } else if (type === 'audio') {
      endpoint = '/api/inbox/send_aud';
      body = { toJid, toName, chatId, instance: selectedInstance, fileName, originalFile: file.name };
    }

    const resp = await api('POST', endpoint, body);
    if (resp.success) { toast('Enviado!'); await loadConvo(); }
    else toast(resp.msg || 'Erro ao enviar');
  } catch(e) { console.error(e); toast('Erro ao enviar arquivo'); }
}

async function loadConvo() {
  if (!selectedChat) return;
  const chatId = selectedChat.chat_id;
  const data = await api('POST', '/api/user/get_convo', { chatId });
  chatMessages[chatId] = Array.isArray(data.data) ? data.data : [];
  renderMessages(chatMessages[chatId]);
  scrollToBottom();
}

// ─────────────────────────────────────────────────────────
// POLL
// ─────────────────────────────────────────────────────────
async function sendPoll() {
  const question = document.getElementById('poll-question').value.trim();
  const optInputs = document.querySelectorAll('#poll-options input');
  const values = Array.from(optInputs).map(i=>i.value.trim()).filter(Boolean);
  if (!question) { toast('Digite a pergunta'); return; }
  if (values.length < 2) { toast('Mínimo 2 opções'); return; }

  closePollModal();
  const toJid = selectedChat.chat_id, toName = selectedChat.sender_name||'', chatId = selectedChat.chat_id;
  const r = await api('POST', '/api/inbox/send_poll', { toJid, toName, chatId, instance: selectedInstance, name: question, values });
  if (r.success || !r.msg?.includes('wrong')) { toast('Enquete enviada!'); await loadConvo(); }
  else toast(r.msg || 'Erro');
}

function openPollModal() { document.getElementById('poll-modal').classList.add('open'); closeAttachMenu(); }
function closePollModal() { document.getElementById('poll-modal').classList.remove('open'); }

// ─────────────────────────────────────────────────────────
// RECORDING
// ─────────────────────────────────────────────────────────
async function startRecording() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    mediaRecorder = new MediaRecorder(stream);
    recordingChunks = [];
    mediaRecorder.ondataavailable = e => recordingChunks.push(e.data);
    mediaRecorder.onstop = async () => {
      const blob = new Blob(recordingChunks, { type: 'audio/ogg; codecs=opus' });
      const file = new File([blob], `voice_${Date.now()}.ogg`, { type: 'audio/ogg' });
      await sendFile('audio', file);
      stream.getTracks().forEach(t => t.stop());
    };
    mediaRecorder.start();
    isRecording = true;
    recordingSeconds = 0;
    showRecordingUI();
    recordingTimer = setInterval(() => {
      recordingSeconds++;
      const m = Math.floor(recordingSeconds/60), s = recordingSeconds%60;
      document.getElementById('rec-time').textContent = `${m}:${s.toString().padStart(2,'0')}`;
    }, 1000);
  } catch(e) { toast('Permissão de microfone negada'); }
}

function stopRecording(send=true) {
  if (!mediaRecorder) return;
  clearInterval(recordingTimer);
  isRecording = false;
  if (!send) { recordingChunks = []; mediaRecorder.stream?.getTracks().forEach(t=>t.stop()); }
  else mediaRecorder.stop();
  hideRecordingUI();
}

function showRecordingUI() {
  document.getElementById('recording-bar').style.display = 'flex';
  document.getElementById('input-wrap').style.display = 'none';
  document.getElementById('send-btn').style.display = 'flex';
  document.getElementById('mic-btn').classList.add('recording');
  // Animate bars
  const wf = document.getElementById('rec-waveform');
  wf.innerHTML = Array.from({length:20},()=>`<div class="rec-bar" style="animation-delay:${Math.random()*.4}s"></div>`).join('');
}

function hideRecordingUI() {
  document.getElementById('recording-bar').style.display = 'none';
  document.getElementById('input-wrap').style.display = 'flex';
  document.getElementById('mic-btn').classList.remove('recording');
  updateSendBtn();
}

// ─────────────────────────────────────────────────────────
// CONTEXT MENU
// ─────────────────────────────────────────────────────────
function showChatContextMenu(e, chatId) {
  const chat = allChats.find(c => c.chat_id === chatId);
  const isPinned = pinnedChats.some(p => p.id === chatId || p.jid === chatId);
  const isUnread = !chat?.is_opened || (chat?.unread_count||0) > 0;
  const menu = document.getElementById('ctx-menu');
  menu.innerHTML = `
    <div class="ctx-item" onclick="archiveChat('${chatId}')">Arquivar conversa</div>
    <div class="ctx-item" onclick="pinChat('${chatId}','${isPinned}')">${isPinned?'Desfixar conversa':'Fixar conversa'}</div>
    <div class="ctx-item" onclick="markRead('${chatId}','${isUnread}')">${isUnread?'Marcar como lida':'Marcar como não lida'}</div>
    <div class="ctx-sep"></div>
    <div class="ctx-item danger" onclick="deleteChat('${chatId}')">Apagar conversa</div>
  `;
  menu.style.left = Math.min(e.clientX, window.innerWidth-210)+'px';
  menu.style.top = Math.min(e.clientY, window.innerHeight-180)+'px';
  menu.classList.add('open');
}

function hideCtxMenu() { document.getElementById('ctx-menu').classList.remove('open'); }

async function deleteChat(chatId) {
  hideCtxMenu();
  if (!confirm('Apagar esta conversa?')) return;
  await api('POST', '/api/inbox/del_chat', { chatId });
  allChats = allChats.filter(c => c.chat_id !== chatId);
  if (selectedChat?.chat_id === chatId) { selectedChat = null; showEmpty(); }
  renderChatList();
  toast('Conversa apagada');
}

async function pinChat(chatId, currentlyPinned) {
  hideCtxMenu();
  if (currentlyPinned === 'true') {
    pinnedChats = pinnedChats.filter(p => p.id !== chatId && p.jid !== chatId);
  } else {
    if (pinnedChats.length >= 3) { toast('Máximo 3 conversas fixadas'); return; }
    pinnedChats.push({ id: chatId, jid: chatId });
  }
  renderChatList();
  toast(currentlyPinned === 'true' ? 'Conversa desafixada' : 'Conversa fixada');
}

function markRead(chatId, isUnread) {
  hideCtxMenu();
  const idx = allChats.findIndex(c => c.chat_id === chatId);
  if (idx !== -1) {
    allChats[idx].unread_count = isUnread === 'true' ? 0 : 1;
    allChats[idx].is_opened = isUnread === 'true' ? 1 : 0;
  }
  renderChatList();
}

function archiveChat(chatId) {
  hideCtxMenu();
  allChats = allChats.filter(c => c.chat_id !== chatId);
  if (selectedChat?.chat_id === chatId) { selectedChat = null; showEmpty(); }
  renderChatList();
  toast('Conversa arquivada');
}

async function openContactPanel() {
  if (!selectedChat) return;
  const panel = document.getElementById('contact-panel');
  panel.classList.add('open');
  const chat = selectedChat;
  const name = chat.sender_name || chat.chat_name || formatJid(chat.chat_id);
  const avatarColor = getAvatarColor(name);

  // Load note
  let note = '';
  try {
    const r = await api('POST', '/api/inbox/get_chat_note', { chatId: chat.chat_id });
    note = r.data || '';
  } catch(e) {}

  document.getElementById('cp-body').innerHTML = `
    <div class="avatar-placeholder ${avatarColor}" style="width:120px;height:120px;border-radius:50%;margin:0 auto;font-size:48px;display:flex;align-items:center;justify-content:center;color:#fff">${getInitials(name)}</div>
    <div class="cp-name">${escHtml(name)}</div>
    <div class="cp-status" id="cp-status-text">${chat.chat_id}</div>
    <div class="cp-section">
      <div class="cp-section-title">NOTA</div>
      <textarea class="cp-note-area" id="cp-note">${escHtml(note)}</textarea>
      <button class="cp-save-btn" onclick="saveNote('${chat.chat_id}')">Salvar nota</button>
    </div>
    <div class="cp-section">
      <div class="cp-section-title">JID</div>
      <div class="cp-field">${escHtml(chat.chat_id)}</div>

  `;
}

async function saveNote(chatId) {
  const note = document.getElementById('cp-note').value;
  await api('POST', '/api/inbox/update_chat_note', { chatId, note });

}

function toggleAudio(src, btn) {
  let audio = audioElements[src];
  if (!audio) { audio = new Audio(src); audioElements[src] = audio; }
  if (audio.paused) {
    Object.values(audioElements).forEach(a => a.pause());
    audio.play();
    btn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>';
    audio.onended = () => { btn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>'; };
  } else {
    audio.pause();
    btn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>';
  }
}

function initWaveformClick(el) {
  const src = el.dataset.src;
  if (!src) return;
  el.addEventListener('click', (e) => {
    const rect = el.getBoundingClientRect();
    const pct = (e.clientX - rect.left) / rect.width;
    let audio = audioElements[src];
    if (!audio) { audio = new Audio(src); audioElements[src] = audio; }
    if (audio.duration) audio.currentTime = audio.duration * pct;
  });
}

// ─────────────────────────────────────────────────────────
// FORMAT HELPERS
// ─────────────────────────────────────────────────────────
function formatText(text) {
  if (!text) return '';
  text = escHtml(text);
  text = text.replace(/\*([^*]+)\*/g,'<strong>$1</strong>');
  text = text.replace(/_([^_]+)_/g,'<em>$1</em>');
  text = text.replace(/~([^~]+)~/g,'<del>$1</del>');
  text = text.replace(/`([^`]+)`/g,'<code>$1</code>');
  text = text.replace(/\n/g,'<br>');
  text = text.replace(/(https?:\/\/[^\s<]+)/g,'<a href="$1" target="_blank" style="color:var(--primary)">$1</a>');
  return text;
}

function escHtml(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#x27;');
}

function formatJid(jid='') { return jid.replace(/@.*/, '').replace(/\+/,''); }

function getInitials(name='') {
  const parts = name.trim().split(' ');
  if (parts.length >= 2) return (parts[0][0]+(parts[1][0]||'')).toUpperCase();
  return (name[0]||'?').toUpperCase();
}

const AV_COLORS = ['av-green','av-blue','av-purple','av-orange','av-pink','av-teal','av-indigo','av-red'];
function getAvatarColor(name='') { let h=0; for(let c of name) h=(h*31+c.charCodeAt(0))&0xffff; return AV_COLORS[h%AV_COLORS.length]; }

function formatTime(ts) {
  if (!ts) return '';
  const d = new Date(ts > 9999999999 ? ts : ts * 1000);
  const now = new Date();
  const diff = (now - d) / 86400000;
  if (diff < 1) return d.toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit'});
  if (diff < 2) return 'Ontem';
  if (diff < 7) return d.toLocaleDateString('pt-BR',{weekday:'long'});
  return d.toLocaleDateString('pt-BR');
}

function formatMsgTime(ts) {
  if (!ts) return '';
  return new Date(ts).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
}

function formatDateSep(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  const now = new Date();
  if (d.toDateString() === now.toDateString()) return 'HOJE';
  const yest = new Date(now); yest.setDate(yest.getDate()-1);
  if (d.toDateString() === yest.toDateString()) return 'ONTEM';
  const diff = (now - d) / 86400000;
  if (diff < 7) return d.toLocaleDateString('pt-BR',{weekday:'long'}).toUpperCase();
  return d.toLocaleDateString('pt-BR');
}

function getPreviewText(c) {
  const type = c.type || c.last_type;
  const ctx = c.last_msg || c.msgContext || {};
  const icons = {image:'📷 Foto',video:'🎥 Vídeo',aud:'🎤 Mensagem de voz',doc:'📄 Documento',loc:'📍 Localização',poll:'📊 Enquete'};
  if (icons[type]) return icons[type];
  return ctx.text || ctx || c.preview || c.last_message || '';
}

function tickIcon(status) {
  if (status === 'pending') return `<svg viewBox="0 0 24 24" style="width:14px;height:14px;fill:#667781"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67V7z"/></svg>`;

  if (status === 'delivered') return `<svg viewBox="0 0 24 24" style="width:16px;height:16px;fill:#667781"><path d="M18 7l-1.41-1.41-6.34 6.34 1.41 1.41L18 7zm4.24-1.41L11.66 16.17 7.48 12l-1.41 1.41L11.66 19l12-12-1.42-1.41zM.41 13.41L6 19l1.41-1.41L1.83 12 .41 13.41z"/></svg>`;

  return '';
}

function openMedia(src, type) {
  if (!src) return;
  window.open(src, '_blank');
}

function toast(msg, dur=3000) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.display = 'block';
  clearTimeout(el._t);
  el._t = setTimeout(() => el.style.display='none', dur);
}

// ─────────────────────────────────────────────────────────
// EVENT LISTENERS
// ─────────────────────────────────────────────────────────
function setupEventListeners() {
  // Input field
  const field = document.getElementById('input-field');
  field.addEventListener('input', updateSendBtn);
  field.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendText(); }
  });

  // Send btn
  document.getElementById('send-btn').addEventListener('click', () => {
    if (isRecording) stopRecording(true);
    else sendText();
  });

  // Mic btn
  document.getElementById('mic-btn').addEventListener('mousedown', async () => {
    if (!selectedChat) { toast('Selecione uma conversa primeiro'); return; }
    await startRecording();
  });
  document.getElementById('mic-btn').addEventListener('mouseup', () => {
    if (isRecording) stopRecording(true);
  });
  document.getElementById('rec-cancel').addEventListener('click', () => stopRecording(false));

  // Attach
  document.getElementById('btn-attach').addEventListener('click', (e) => { e.stopPropagation(); toggleAttachMenu(); });
  document.getElementById('att-photo').addEventListener('click', () => { document.getElementById('file-photo').click(); closeAttachMenu(); });
  document.getElementById('att-doc').addEventListener('click', () => { document.getElementById('file-doc').click(); closeAttachMenu(); });
  document.getElementById('att-audio').addEventListener('click', () => { document.getElementById('file-audio').click(); closeAttachMenu(); });
  document.getElementById('att-location').addEventListener('click', () => { sendLocation(); closeAttachMenu(); });
  document.getElementById('att-poll').addEventListener('click', () => { openPollModal(); });

  // File inputs
  document.getElementById('file-photo').addEventListener('change', async e => {
    for (const file of e.target.files) {
      const isVideo = file.type.startsWith('video/');
      await sendFile(isVideo ? 'video' : 'image', file);
    }
    e.target.value = '';
  });
  document.getElementById('file-doc').addEventListener('change', async e => {
    if (e.target.files[0]) await sendFile('doc', e.target.files[0]);
    e.target.value = '';
  });
  document.getElementById('file-audio').addEventListener('change', async e => {
    if (e.target.files[0]) await sendFile('audio', e.target.files[0]);
    e.target.value = '';
  });

  // Emoji
  document.getElementById('btn-emoji').addEventListener('click', (e) => { e.stopPropagation(); toggleEmojiPicker(); });
  document.getElementById('emoji-search-input').addEventListener('input', e => loadEmojis(e.target.value));

  // Contact panel
  document.getElementById('hdr-contact-btn').addEventListener('click', openContactPanel);
  document.getElementById('btn-close-cp').addEventListener('click', () => document.getElementById('contact-panel').classList.remove('open'));

  // Search
  document.getElementById('search-input').addEventListener('input', e => {
    searchQuery = e.target.value;
    renderChatList();
  });

  // Filters
  document.querySelectorAll('.filter-chip').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-chip').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFilter = btn.dataset.filter;
      renderChatList();
    });
  });

  // Poll modal
  document.getElementById('btn-close-poll').addEventListener('click', closePollModal);
  document.getElementById('btn-cancel-poll').addEventListener('click', closePollModal);
  document.getElementById('btn-send-poll').addEventListener('click', sendPoll);
  document.getElementById('add-poll-opt').addEventListener('click', () => {
    const container = document.getElementById('poll-options');
    const count = container.querySelectorAll('.poll-opt-input-row').length + 1;
    const row = document.createElement('div');
    row.className = 'poll-opt-input-row';
    row.innerHTML = `<input type="text" placeholder="Opção ${count}"/><button class="rm-opt-btn" onclick="removePollOpt(this)">✕</button>`;
    container.appendChild(row);
  });

  // Global click closes menus
  document.addEventListener('click', (e) => {
    if (!e.target.closest('#ctx-menu')) hideCtxMenu();
    if (!e.target.closest('#emoji-picker') && !e.target.closest('#btn-emoji')) document.getElementById('emoji-picker').classList.remove('open');
    if (!e.target.closest('#attach-menu') && !e.target.closest('#btn-attach')) closeAttachMenu();
  });

  // Keyboard shortcuts
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      hideCtxMenu();
      closePollModal();
      document.getElementById('emoji-picker').classList.remove('open');
      closeAttachMenu();
    }
  });
}

function removePollOpt(btn) {
  const container = document.getElementById('poll-options');
  if (container.querySelectorAll('.poll-opt-input-row').length <= 2) { toast('Mínimo 2 opções'); return; }
  btn.closest('.poll-opt-input-row').remove();
}

async function sendLocation() {
  if (!selectedChat) return;
  if (!navigator.geolocation) { toast('Geolocalização não disponível'); return; }
  navigator.geolocation.getCurrentPosition(async pos => {
    const { latitude: lat, longitude: long } = pos.coords;
    const toJid = selectedChat.chat_id, toName = selectedChat.sender_name||'', chatId = selectedChat.chat_id;
    const r = await api('POST', '/api/inbox/send_loc', { toJid, toName, chatId, instance: selectedInstance, lat, long });
    if (r.success) { toast('Localização enviada!'); await loadConvo(); }
    else toast(r.msg || 'Erro');
  }, () => toast('Permissão de localização negada'));
}
